<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿公的字鐘</title>
    <meta name="description" content="A traditional Chinese character word clock — 九十大壽">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { color-scheme: dark; }

        :root {
            --gold: #ffd700;
            --red: #d44525;
            --orange: #e06030;
            --cream: #fff2d6;
            --bg: #080404;
            --frame: #120808;
            --dim: 0.06;
        }

        body {
            background: var(--bg);
            font-family: 'Noto Serif TC', 'Songti TC', 'PMingLiU', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
            color: var(--gold);
        }

        /* ── Title ── */
        .title {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 8px;
            color: rgba(255,215,0,0.2);
            margin-bottom: 16px;
            text-indent: 8px;
        }

        /* ── Clock frame ── */
        #frame {
            background: linear-gradient(155deg, #1a0a08, var(--frame), #1a0a08);
            border: 2px solid rgba(255,215,0,0.08);
            border-radius: 8px;
            padding: clamp(14px, 3.5vw, 36px);
            box-shadow:
                0 0 80px rgba(139,0,0,0.08),
                0 0 160px rgba(0,0,0,0.9),
                inset 0 1px 0 rgba(255,215,0,0.04);
            max-width: 500px;
            width: 100%;
        }

        /* ── Grid ── */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            column-gap: clamp(3px, 0.8vw, 7px);
            row-gap: clamp(2px, 0.5vw, 4px);
            aspect-ratio: 1;
        }

        .c {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(15px, 4.5vw, 42px);
            font-weight: 700;
            color: rgba(255,215,0, var(--dim));
            transition: color 0.7s ease, text-shadow 0.7s ease;
            aspect-ratio: 1;
            user-select: none;
            line-height: 1;
            cursor: default;
        }

        /* Active states */
        .c.t {
            color: var(--gold);
            text-shadow:
                0 0 6px rgba(255,215,0,0.9),
                0 0 18px rgba(255,215,0,0.5),
                0 0 36px rgba(255,215,0,0.2);
        }

        .c.m {
            color: var(--red);
            font-weight: 400;
            text-shadow:
                0 0 6px rgba(212,69,37,0.9),
                0 0 18px rgba(212,69,37,0.5),
                0 0 36px rgba(212,69,37,0.2);
        }

        .c.g {
            color: var(--orange);
            font-weight: 400;
            text-shadow:
                0 0 6px rgba(224,96,48,0.9),
                0 0 18px rgba(224,96,48,0.5),
                0 0 36px rgba(224,96,48,0.2);
        }

        .c.b {
            color: var(--orange);
            font-weight: 400;
            text-shadow:
                0 0 6px rgba(224,96,48,0.9),
                0 0 18px rgba(224,96,48,0.5),
                0 0 36px rgba(224,96,48,0.2);
        }

        /* 2×2 spanning characters */
        .big {
            grid-column: span 2;
            grid-row: span 2;
            font-size: clamp(30px, 9vw, 84px);
            font-weight: 900;
        }

        /* Hover: group highlight */
        .c.hl {
            background: rgba(255,215,0,0.07);
            border-radius: 3px;
        }

        /* Tooltip */
        #tip {
            position: fixed;
            background: rgba(12,6,4,0.96);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 6px 11px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 260px;
        }
        #tip.show { opacity: 1; }
        #tip .zh { color: var(--gold); font-weight: 700; }
        #tip .en { color: rgba(255,215,0,0.55); font-style: italic; margin-left: 4px; }

        /* ── Reading display ── */
        #reading {
            text-align: center;
            margin-top: 16px;
            max-width: 500px;
            width: 100%;
        }

        #zh-reading {
            font-size: clamp(13px, 3vw, 18px);
            color: rgba(255,215,0,0.3);
            letter-spacing: 2px;
            min-height: 1.5em;
        }

        #en-time {
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 11px;
            color: rgba(255,215,0,0.15);
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ── Controls ── */
        #controls {
            margin-top: 20px;
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .cl {
            font-size: 10px;
            color: rgba(255,215,0,0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .btn {
            background: rgba(255,215,0,0.03);
            border: 1px solid rgba(255,215,0,0.12);
            color: rgba(255,215,0,0.35);
            padding: 7px 13px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255,215,0,0.06);
            border-color: rgba(255,215,0,0.25);
            color: rgba(255,215,0,0.6);
        }

        .btn.on {
            background: rgba(255,215,0,0.08);
            border-color: rgba(255,215,0,0.4);
            color: var(--gold);
        }

        input[type="time"] {
            background: rgba(255,215,0,0.03);
            border: 1px solid rgba(255,215,0,0.12);
            color: var(--gold);
            padding: 7px 10px;
            border-radius: 5px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 14px;
            width: 110px;
            transition: all 0.25s ease;
        }

        input[type="time"]:focus {
            outline: none;
            border-color: rgba(255,215,0,0.4);
        }

        input[type="time"]:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* ── Responsive ── */
        @media (max-width: 380px) {
            body { padding: 12px 8px; }
            #frame { padding: 10px; }
            .btn { padding: 6px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="title">阿公的字鐘</div>

<div id="frame">
    <div id="grid"></div>
</div>

<div id="tip"></div>

<div id="reading">
    <div id="zh-reading"></div>
    <div id="en-time"></div>
</div>

<div id="controls">
    <div>
        <div class="cl">時間 Time</div>
        <div class="row">
            <button class="btn on" id="btn-auto">自動</button>
            <input type="time" id="inp-time" disabled>
        </div>
    </div>
    <div>
        <div class="cl">祝福 Blessings</div>
        <div class="row" id="msg-row"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  GRID LAYOUT  (8 × 8)  — vertical traditional reading
//  Columns read right-to-left (col 7 first). Within a column,
//  read top-to-bottom. null = covered by a 2×2 spanning char.
// ═══════════════════════════════════════════════════════════
//        0     1     2     3     4     5     6     7
const G=[
  /*0*/ ['生', '福', '整', '二', '七', '凌', null, null],
  /*1*/ ['日', '如', '半', '十', '八', '晨', null, null],
  /*2*/ ['快', '東', '一', '三', '九', '一', null, null],
  /*3*/ ['樂', '海', '刻', '十', '十', '兩', null, null],
  /*4*/ ['身', '壽', '三', '四', '一', '三', '晚', '早'],
  /*5*/ ['體', '比', '刻', '十', '十', '四', '安', '安'],
  /*6*/ ['健', '南', '五', '五', '二', '五', '現', '午'],
  /*7*/ ['康', '山', '分', '十', '點', '六', '在', '安'],
];

// 2×2 characters (top-left origin) — 阿 and 公 stacked in the top-right
const BIG = [
    { ch: '阿', r: 0, c: 6 },
    { ch: '公', r: 2, c: 6 },
];

// Pre-compute occupied cells
const occ = new Set();
BIG.forEach(b => {
    for (let dr = 0; dr < 2; dr++)
        for (let dc = 0; dc < 2; dc++)
            occ.add(`${b.r + dr}-${b.c + dc}`);
});

// ═══════════════════════════════════════════════════════════
//  CELL COORDINATE MAPS
//  Each phrase maps to the [row, col] positions it lights up
// ═══════════════════════════════════════════════════════════

// Hour (12-hour). Note: hour 2 uses 兩 (natural in spoken Taiwanese Mandarin)
const HOUR = {
    1:  [[2,5]],                // 一
    2:  [[3,5]],                // 兩
    3:  [[4,5]],                // 三
    4:  [[5,5]],                // 四
    5:  [[6,5]],                // 五
    6:  [[7,5]],                // 六
    7:  [[0,4]],                // 七
    8:  [[1,4]],                // 八
    9:  [[2,4]],                // 九
    10: [[3,4]],                // 十
    11: [[3,4],[4,4]],          // 十 + 一  (shared row-3 十 with hour 10)
    12: [[5,4],[6,4]],          // 十 + 二  (distinct 十 at row 5)
};

// Minutes (rounded to nearest 5)
const MINS = {
    0:  [[0,2]],                           // 整
    5:  [[6,2],[7,2]],                     // 五 + 分
    10: [[1,3],[7,2]],                     // 十 (shared from 二十 pair) + 分
    15: [[2,2],[3,2]],                     // 一 + 刻
    20: [[0,3],[1,3],[7,2]],               // 二十 + 分
    25: [[0,3],[1,3],[6,2],[7,2]],         // 二十 + 五分
    30: [[1,2]],                           // 半
    35: [[2,3],[3,3],[6,2],[7,2]],         // 三十 + 五分
    40: [[4,3],[5,3],[7,2]],               // 四十 + 分
    45: [[4,2],[5,2]],                     // 三 + 刻
    50: [[6,3],[7,3],[7,2]],               // 五十 + 分
    55: [[6,3],[7,3],[6,2],[7,2]],         // 五十 + 五分
};

// Time-appropriate greeting (one of three, based on hour)
const GREET = {
    '早安': [[4,7],[5,7]],   // col 7, rows 4–5 — 6am to noon
    '午安': [[6,7],[7,7]],   // col 7, rows 6–7 — noon to 6pm
    '晚安': [[4,6],[5,6]],   // col 6, rows 4–5 — 6pm to 6am
};

// Always-lit cells, grouped by semantic class.
// .t = gold (time), .m = red (阿公 focal point),
// .g = orange (time-of-day greetings), .b = cream (blessings)
// These are marked with '.a' in buildGrid so tick()'s clear loop never wipes them.
const ALWAYS_LIT = {
    t: [
        [6,6], [7,6],                          // 現在 (moved from col 5 to free space for 凌晨)
        [7,4],                                 // 點
    ],
    m: [
        [0,6], [2,6],                          // 阿 公 (2×2 big char origins)
    ],
    b: [
        [4,0], [5,0], [6,0], [7,0],            // 身體健康 (general well-wish, always lit)
    ],
};

// 凌晨 (pre-dawn period qualifier) — lit with .t when rh < 6.
// Semantically a time structure word, not a greeting, so gold not orange.
const PREDAWN = [[0,5],[1,5]];

// Birthday blessings — toggleable; default on only on May 11.
// 生日快樂 + the canonical elder-birthday couplet 福如東海 / 壽比南山
const BIRTHDAY_CELLS = [
    [0,0], [1,0], [2,0], [3,0],                // 生日快樂
    [0,1], [1,1], [2,1], [3,1],                // 福如東海
    [4,1], [5,1], [6,1], [7,1],                // 壽比南山
];
const BIRTHDAY_MONTH = 5;   // May
const BIRTHDAY_DAY   = 11;

// ═══════════════════════════════════════════════════════════
//  SEMANTIC GROUPS  (for hover tooltips)
//  A cell can belong to multiple groups — tooltip shows all
// ═══════════════════════════════════════════════════════════
const GROUPS = [
    // ── Big characters (top-right, 2×2 each) ──
    { cells:[[0,6]], zh:'阿公', en:'Grandpa' },
    { cells:[[2,6]], zh:'阿公', en:'Grandpa' },

    // ── Greetings (cols 6–7, rows 4–7) ──
    { cells:[[4,7],[5,7]], zh:'早安', en:'Good Morning (6am–noon)' },
    { cells:[[6,7],[7,7]], zh:'午安', en:'Good Afternoon (noon–6pm)' },
    { cells:[[4,6],[5,6]], zh:'晚安', en:'Good Evening (6pm–6am)' },

    // ── Time structure ──
    { cells:[[6,6],[7,6]], zh:'現在', en:'Right now / It is' },
    { cells:[[0,5],[1,5]], zh:'凌晨', en:'Pre-dawn hours (midnight–6am)' },
    { cells:[[7,4]],       zh:'點',   en:"O'clock" },

    // ── Hours (cols 4–5) ──
    { cells:[[2,5]], zh:'一', en:'One / 1 o\'clock' },
    { cells:[[3,5]], zh:'兩', en:'Two / 2 o\'clock (Taiwanese spoken form)' },
    { cells:[[4,5]], zh:'三', en:'Three / 3' },
    { cells:[[5,5]], zh:'四', en:'Four / 4' },
    { cells:[[6,5]], zh:'五', en:'Five / 5' },
    { cells:[[7,5]], zh:'六', en:'Six / 6' },
    { cells:[[0,4]], zh:'七', en:'Seven / 7' },
    { cells:[[1,4]], zh:'八', en:'Eight / 8' },
    { cells:[[2,4]], zh:'九', en:'Nine / 9' },
    { cells:[[3,4]], zh:'十', en:'Ten / 10' },
    { cells:[[3,4],[4,4]], zh:'十一', en:'Eleven / 11' },
    { cells:[[5,4],[6,4]], zh:'十二', en:'Twelve / 12' },

    // ── Minute specials (col 2) ──
    { cells:[[0,2]],       zh:'整',   en:'Exactly / On the hour' },
    { cells:[[1,2]],       zh:'半',   en:'Half past' },
    { cells:[[2,2],[3,2]], zh:'一刻', en:'Quarter (15 minutes)' },
    { cells:[[4,2],[5,2]], zh:'三刻', en:'Three quarters (45 minutes)' },
    { cells:[[6,2],[7,2]], zh:'五分', en:'5 minutes' },
    { cells:[[7,2]],       zh:'分',   en:'Minutes (suffix)' },

    // ── Minute tens (col 3) ──
    { cells:[[0,3],[1,3]], zh:'二十', en:'Twenty / 20 minutes' },
    { cells:[[2,3],[3,3]], zh:'三十', en:'Thirty / 30 minutes' },
    { cells:[[4,3],[5,3]], zh:'四十', en:'Forty / 40 minutes' },
    { cells:[[6,3],[7,3]], zh:'五十', en:'Fifty / 50 minutes' },
    { cells:[[1,3]],       zh:'十',   en:'Ten (shared, used for :10)' },

    // ── Blessings (cols 0–1, always lit) ──
    { cells:[[0,0],[1,0],[2,0],[3,0]], zh:'生日快樂', en:'Happy Birthday' },
    { cells:[[4,0],[5,0],[6,0],[7,0]], zh:'身體健康', en:'Good Health' },
    { cells:[[0,1],[1,1],[2,1],[3,1]], zh:'福如東海', en:'Blessings vast as the Eastern Sea' },
    { cells:[[4,1],[5,1],[6,1],[7,1]], zh:'壽比南山', en:'Longevity like the Southern Mountain' },
];

// Build cell → groups lookup (a cell can appear in multiple groups)
const cellGroups = new Map();
GROUPS.forEach(g => {
    g.cells.forEach(([r,c]) => {
        const key = `${r}-${c}`;
        if (!cellGroups.has(key)) cellGroups.set(key, []);
        cellGroups.get(key).push(g);
    });
});

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let auto   = true;
let manual = null;
let greetOn = true;
// Default birthday blessings on only if today is actually May 11. User can toggle.
let birthdayOn = (() => {
    const n = new Date();
    return n.getMonth() + 1 === BIRTHDAY_MONTH && n.getDate() === BIRTHDAY_DAY;
})();
let lastKey = '';

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
const cid = (r, c) => `c${r}_${c}`;
const $   = s => document.getElementById(s);

function getPeriod(h) {
    if (h < 6)             return '凌晨';   // pre-dawn
    if (h < 9)             return '早上';   // early morning
    if (h < 12)            return '上午';   // late morning
    if (h === 12)          return '中午';   // noon
    if (h < 18)            return '下午';   // afternoon
    return '晚上';                          // evening / night
}

function getGreeting(h) {
    if (h >= 6  && h < 12) return '早安';
    if (h >= 12 && h < 18) return '午安';
    return '晚安';
}

// Chinese hour names (兩 for 2 o'clock — natural in spoken Taiwanese Mandarin)
const HNAME = ['','一','兩','三','四','五','六','七','八','九','十','十一','十二'];

// Chinese minute names
const MNAME = {
    0:'整', 5:'五分', 10:'十分', 15:'一刻', 20:'二十分', 25:'二十五分',
    30:'半', 35:'三十五分', 40:'四十分', 45:'三刻', 50:'五十分', 55:'五十五分'
};

function getReading(h24, h12, rm) {
    return `現在是${getPeriod(h24)}${HNAME[h12]}點${MNAME[rm]}`;
}

// ═══════════════════════════════════════════════════════════
//  TOOLTIP HELPERS
// ═══════════════════════════════════════════════════════════
function moveTip(e) {
    const tip = $('tip');
    let x = e.clientX + 14;
    let y = e.clientY + 14;
    const w = tip.offsetWidth;
    const h = tip.offsetHeight;
    if (x + w > window.innerWidth - 8)  x = e.clientX - w - 10;
    if (y + h > window.innerHeight - 8) y = e.clientY - h - 10;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
}

function addHover(el, r, c) {
    el.addEventListener('mouseenter', (e) => {
        const groups = cellGroups.get(`${r}-${c}`);
        if (!groups || groups.length === 0) return;

        // Highlight all cells in the primary (first) group
        groups[0].cells.forEach(([gr,gc]) => {
            $(cid(gr,gc))?.classList.add('hl');
        });

        // Build tooltip content — show all groups this cell belongs to
        const tip = $('tip');
        tip.innerHTML = groups.map(g =>
            `<span class="zh">${g.zh}</span><span class="en">${g.en}</span>`
        ).join('<br>');
        tip.classList.add('show');
        moveTip(e);
    });

    el.addEventListener('mouseleave', () => {
        document.querySelectorAll('.hl').forEach(e => e.classList.remove('hl'));
        $('tip').classList.remove('show');
    });

    el.addEventListener('mousemove', moveTip);
}

// ═══════════════════════════════════════════════════════════
//  BUILD GRID DOM
// ═══════════════════════════════════════════════════════════
function buildGrid() {
    const grid = $('grid');

    // Place 2×2 characters with explicit grid positioning
    BIG.forEach(b => {
        const el = document.createElement('div');
        el.className = 'c big';
        el.id = cid(b.r, b.c);
        el.textContent = b.ch;
        el.style.gridRow    = `${b.r + 1} / ${b.r + 3}`;
        el.style.gridColumn = `${b.c + 1} / ${b.c + 3}`;
        addHover(el, b.r, b.c);
        grid.appendChild(el);
    });

    // Place remaining regular-sized characters
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            if (occ.has(`${r}-${c}`)) continue;
            const el = document.createElement('div');
            el.className = 'c';
            el.id = cid(r, c);
            el.textContent = G[r][c];
            el.style.gridRow    = String(r + 1);
            el.style.gridColumn = String(c + 1);
            addHover(el, r, c);
            grid.appendChild(el);
        }
    }

    // Apply always-lit classes. The .a marker lets tick()'s clear loop skip
    // these cells so they never flicker.
    Object.entries(ALWAYS_LIT).forEach(([cls, cells]) => {
        cells.forEach(([r, c]) => {
            $(cid(r, c))?.classList.add('a', cls);
        });
    });
}

// ═══════════════════════════════════════════════════════════
//  CLOCK TICK
// ═══════════════════════════════════════════════════════════
function tick() {
    const now = new Date();
    let h, m;

    if (auto) {
        h = now.getHours();
        m = now.getMinutes();
    } else if (manual) {
        [h, m] = manual.split(':').map(Number);
    } else {
        h = now.getHours();
        m = now.getMinutes();
    }

    // Round minutes to nearest 5; handle overflow into next hour
    let rm = Math.round(m / 5) * 5;
    let rh = h;
    if (rm >= 60) { rm = 0; rh = (h + 1) % 24; }
    const h12 = rh % 12 || 12;

    // Only re-render grid when the displayed state actually changes
    const key = `${rh}:${rm}:${greetOn}:${birthdayOn}`;
    if (key !== lastKey) {
        lastKey = key;

        // Clear dynamic classes only — .a cells (現在, 點, 阿公,
        // 身體健康) are always-lit and must be preserved.
        document.querySelectorAll('.c:not(.a)').forEach(el => {
            el.classList.remove('t', 'm', 'g', 'b');
        });

        // ── Time ── (現在 and 點 are always-lit via ALWAYS_LIT)

        // Hour
        HOUR[h12].forEach(([r,c]) => $(cid(r,c))?.classList.add('t'));

        // Minutes
        MINS[rm].forEach(([r,c]) => $(cid(r,c))?.classList.add('t'));

        // 凌晨 pre-dawn qualifier — time structure, not a greeting,
        // so gold (.t) and not gated by greetOn.
        if (rh < 6) {
            PREDAWN.forEach(([r,c]) => $(cid(r,c))?.classList.add('t'));
        }

        // ── Greeting ── (one of 早安 / 午安 / 晚安)
        if (greetOn) {
            GREET[getGreeting(rh)].forEach(([r,c]) => $(cid(r,c))?.classList.add('g'));
        }

        // ── Birthday blessings ── (toggleable; default on only on May 11)
        if (birthdayOn) {
            BIRTHDAY_CELLS.forEach(([r,c]) => $(cid(r,c))?.classList.add('b'));
        }
    }

    // Always update text displays (seconds tick even when grid doesn't change)
    $('zh-reading').textContent = getReading(rh, h12, rm);
    const display_h = auto ? now.getHours() : h;
    const display_m = auto ? now.getMinutes() : m;
    const sec = auto ? ':' + String(now.getSeconds()).padStart(2, '0') : '';
    $('en-time').textContent =
        `${String(display_h).padStart(2,'0')}:${String(display_m).padStart(2,'0')}${sec}`;
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════
function setupControls() {
    const autoBtn  = $('btn-auto');
    const timeInp  = $('inp-time');

    // Auto / Manual toggle
    autoBtn.addEventListener('click', () => {
        auto = !auto;
        autoBtn.classList.toggle('on', auto);
        autoBtn.textContent = auto ? '自動' : '手動';
        timeInp.disabled = auto;
        if (!auto) {
            const n = new Date();
            timeInp.value = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
            manual = timeInp.value;
        }
        lastKey = '';
        tick();
    });

    timeInp.addEventListener('input', () => {
        manual = timeInp.value;
        lastKey = '';
        tick();
    });

    // Greeting toggle (早安 / 午安 / 晚安)
    const gBtn = document.createElement('button');
    gBtn.className = 'btn on';
    gBtn.textContent = '問候';
    gBtn.title = 'Time-of-day greeting (早安 / 午安 / 晚安)';
    gBtn.addEventListener('click', () => {
        greetOn = !greetOn;
        gBtn.classList.toggle('on', greetOn);
        lastKey = '';
        tick();
    });
    $('msg-row').appendChild(gBtn);

    // Birthday blessings toggle (生日快樂 / 福如東海 / 壽比南山)
    const bBtn = document.createElement('button');
    bBtn.className = birthdayOn ? 'btn on' : 'btn';
    bBtn.textContent = '祝壽';
    bBtn.title = 'Birthday blessings — auto-on on May 11';
    bBtn.addEventListener('click', () => {
        birthdayOn = !birthdayOn;
        bBtn.classList.toggle('on', birthdayOn);
        lastKey = '';
        tick();
    });
    $('msg-row').appendChild(bBtn);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
buildGrid();
setupControls();
tick();
setInterval(tick, 1000);
</script>
